<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faqBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9b8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d7a72;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" fill="url(#faqBg)"/>
  
  <!-- Circular outline -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="white" stroke-width="2" opacity="0.18"/>
  
  <!-- Network nodes and connections -->
  <g stroke="#5eb3d6" stroke-width="2.5" opacity="0.7">
    <line x1="256" y1="130" x2="256" y2="155"/>
    <line x1="360" y1="160" x2="330" y2="185"/>
    <line x1="395" y1="220" x2="360" y2="220"/>
    <line x1="360" y1="360" x2="330" y2="335"/>
    <line x1="256" y1="400" x2="256" y2="375"/>
    <line x1="150" y1="360" x2="180" y2="335"/>
    <line x1="115" y1="290" x2="150" y2="290"/>
    <line x1="150" y1="150" x2="180" y2="185"/>
  </g>
  
  <!-- Network nodes -->
  <g fill="white">
    <circle cx="256" cy="130" r="9"/>
    <circle cx="375" cy="160" r="7"/>
    <circle cx="410" cy="220" r="7"/>
    <circle cx="375" cy="360" r="7"/>
    <circle cx="256" cy="400" r="9"/>
    <circle cx="135" cy="360" r="7"/>
    <circle cx="100" cy="290" r="7"/>
    <circle cx="135" cy="150" r="7"/>
    <!-- Center -->
    <circle cx="256" cy="256" r="11" fill="#5eb3d6"/>
  </g>
  
  <!-- Growth arrow -->
  <g fill="none" stroke="#5eb3d6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <line x1="200" y1="330" x2="240" y2="160"/>
    <polygon points="240,160 220,185 240,160 255,175" fill="#5eb3d6" stroke="none"/>
  </g>
  
  <!-- Ascending bars -->
  <g fill="#5eb3d6" opacity="0.8">
    <rect x="280" y="320" width="12" height="50" rx="2"/>
    <rect x="305" y="290" width="12" height="80" rx="2"/>
    <rect x="330" y="250" width="12" height="120" rx="2"/>
  </g>
</svg>