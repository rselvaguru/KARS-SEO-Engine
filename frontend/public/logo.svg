<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9b8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d7a72;stop-opacity:1" />
    </linearGradient>
    <style>
      .logo-text-bold { font-family: 'Segoe UI', Verdana, sans-serif; font-size: 44px; font-weight: 700; fill: #2d7a72; }
      .logo-text-light { font-family: 'Segoe UI', Verdana, sans-serif; font-size: 26px; fill: #6b7280; font-weight: 400; }
    </style>
  </defs>
  
  <!-- Circular background for network -->
  <g>
    <!-- Outer circle border -->
    <circle cx="90" cy="90" r="82" fill="none" stroke="url(#circleGradient)" stroke-width="2" opacity="0.3"/>
    
    <!-- Network nodes and connections -->
    <g stroke="#5eb3d6" stroke-width="1.5" fill="none">
      <!-- Circular connections -->
      <line x1="90" y1="15" x2="90" y2="30" stroke="#4a9b8f" stroke-width="2.5"/>
      <line x1="154" y1="26" x2="143" y2="37" stroke="#4a9b8f" stroke-width="2.5"/>
      <line x1="175" y1="47" x2="161" y2="55" stroke="#4a9b8f" stroke-width="2.5"/>
      <line x1="167" y1="90" x2="151" y2="90" stroke="#4a9b8f" stroke-width="2.5"/>
      <line x1="154" y1="154" x2="143" y2="143" stroke="#4a9b8f" stroke-width="2.5"/>
      <line x1="90" y1="175" x2="90" y2="160" stroke="#4a9b8f" stroke-width="2.5"/>
      <line x1="26" y1="154" x2="37" y2="143" stroke="#4a9b8f" stroke-width="2.5"/>
      <line x1="13" y1="90" x2="29" y2="90" stroke="#4a9b8f" stroke-width="2.5"/>
      <line x1="26" y1="26" x2="37" y2="37" stroke="#4a9b8f" stroke-width="2.5"/>
    </g>
    
    <!-- Network nodes (dots) -->
    <g fill="#4a9b8f">
      <circle cx="90" cy="20" r="4.5"/>
      <circle cx="160" cy="31" r="4"/>
      <circle cx="172" cy="50" r="4"/>
      <circle cx="168" cy="90" r="4"/>
      <circle cx="155" cy="150" r="4"/>
      <circle cx="90" cy="168" r="4.5"/>
      <circle cx="25" cy="150" r="4"/>
      <circle cx="12" cy="90" r="4"/>
      <circle cx="25" cy="31" r="4"/>
      
      <!-- Center node (larger) -->
      <circle cx="90" cy="90" r="6" fill="#2d7a72"/>
    </g>
    
    <!-- Upward trending arrow -->
    <g fill="none" stroke="#5eb3d6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 130 130 L 155 60" stroke-width="3"/>
      <polyline points="155,60 145,75 155,60 165,73" fill="none"/>
    </g>
    
    <!-- Ascending bar chart -->
    <g fill="#5eb3d6" opacity="0.65">
      <rect x="125" y="115" width="6" height="32" rx="1"/>
      <rect x="137" y="105" width="6" height="42" rx="1"/>
      <rect x="149" y="95" width="6" height="52" rx="1"/>
    </g>
  </g>
  
  <!-- Text: KARS -->
  <text x="250" y="80" class="logo-text-bold">KARS</text>
  
  <!-- Text: SEO Engine -->
  <text x="250" y="120" class="logo-text-light">SEO Engine</text>
</svg>